#flexboxlayout
google-flexbox = { group = "com.google.android.flexbox", name = "flexbox", version.ref = "flexbox" }

# kakao login
kakao-user = { group = "com.kakao.sdk", name = "v2-all", version.ref = "kakao" }

# opencsv
opencsv = { group = "com.opencsv", name = "opencsv", version.ref = "opencsv" }

# pure coroutines
kotlinx-coroutines-core = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-core", version.ref = "kotlinxCoroutines" }

#dataStore & Gson
androidx-datastore-preferences = { group = "androidx.datastore", name = "datastore-preferences", version.ref = "datastore" }
google-code-gson = { group = "com.google.code.gson", name = "gson", version.ref = "gson" }

#coli
coil = { group = "io.coil-kt", name = "coil", version.ref = "coil" }
coil-compose = { group = "io.coil-kt", name = "coil-compose", version.ref = "coil-compose" }

# Credential Manager 핵심 라이브러리
androidx-credentials = { group = "androidx.credentials", name = "credentials", version.ref = "credentials" }
# Google Play Services 인증 지원 (구버전 안드로이드 호환용)
androidx-credentials-play-services-auth = { group = "androidx.credentials", name = "credentials-play-services-auth", version.ref = "credentials" }
# Google ID (Sign in with Google 옵션)
googleid = { group = "com.google.android.libraries.identity.googleid", name = "googleid", version.ref = "googleId" }
# Google Play Services Auth (Access Token 용)
google-play-services-auth = { group = "com.google.android.gms", name = "play-services-auth", version.ref = "googlePlayServicesAuth" }
# Play In-App Update
play-update = { group = "com.google.android.play", name = "app-update", version.ref = "playInAppUpdate" }
play-update-ktx = { group = "com.google.android.play", name = "app-update-ktx", version.ref = "playInAppUpdate" }

